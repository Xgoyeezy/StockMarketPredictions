version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-signals-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/backend/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: stock-signals-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  backend-storage:
