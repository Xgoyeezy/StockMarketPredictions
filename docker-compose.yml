version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stock-signals-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-stock_signals}
      POSTGRES_USER: ${POSTGRES_USER:-stock_signals}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_signals}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: stock-signals-api
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://stock_signals:stock_signals@postgres:5432/stock_signals}
      FEATURE_LIVE_TRADING: ${FEATURE_LIVE_TRADING:-false}
      FEATURE_MANAGED_ADVISORY: ${FEATURE_MANAGED_ADVISORY:-false}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_PROVIDER: ${AUTH_PROVIDER:-local-session}
      ALLOW_DEMO_AUTH: ${ALLOW_DEMO_AUTH:-false}
      LOCAL_AUTH_ALLOW_SIGNUP: ${LOCAL_AUTH_ALLOW_SIGNUP:-false}
      RUNTIME_LOGS_DIR: /app/runtime-logs
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@local}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Local Admin}
      SEED_TENANT_SLUG: ${SEED_TENANT_SLUG:-systematic-equities}
      SEED_TENANT_NAME: ${SEED_TENANT_NAME:-Systematic Equities Desk}
      SEED_TENANT_PLAN_KEY: ${SEED_TENANT_PLAN_KEY:-personal}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend-storage:/app/backend/storage
      - ./runtime-logs:/app/runtime-logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: stock-signals-frontend
    depends_on:
      - api
    ports:
      - "5173:80"

volumes:
  backend-storage:
  postgres-data:
