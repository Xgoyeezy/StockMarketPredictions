name: Bug report
description: Report something that is not working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Keep this free of secrets, account IDs, broker records, raw logs, and raw local paths.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I did not include secrets, broker credentials, account IDs, raw broker records, raw logs, or private local file paths.
          required: true
